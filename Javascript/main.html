DOM Manipulation - Altering html content using javascript

Without DOM - html content is static

With DOM - html content is dynamic (button clickable, form validation, theme mode)


1. getElementById() - it will return the element which has the specified id
example : <h1 id="title">Hello Students</h1>

document.getElementById("title") - it will return the h1 element

2. Query selector
document.querySelector()

<h1 class="title">Hello Students</h1>
document.querySelector(".title")

3. querySelectorAll() - it will return all the elements which has the specified selector

<p>HTML</p>
<p>CSS</p>
<p>JavaScript</p>

document.querySelectorAll("p") - it will return all the p elements in the form of node list
